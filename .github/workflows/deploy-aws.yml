name: Deploy AWS

"on":
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  select-environment:
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.select.outputs.target_env }}
    steps:
      - id: select
        name: Select target environment
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            TARGET="dev"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET="prod"
          else
            echo "Unsupported ref: ${{ github.ref }}" >&2
            exit 1
          fi

          echo "target_env=${TARGET}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: select-environment
    environment: ${{ needs.select-environment.outputs.target_env }}
    permissions:
      id-token: write
      contents: read
    env:
      TF_ENV: ${{ needs.select-environment.outputs.target_env }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required environment secrets
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VPC_ID: ${{ secrets.VPC_ID }}
          PUBLIC_SUBNET_IDS_JSON: ${{ secrets.PUBLIC_SUBNET_IDS_JSON }}
        run: |
          set -euo pipefail
          for name in AWS_ROLE_ARN TF_STATE_BUCKET TF_LOCK_TABLE NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY CLERK_SECRET_KEY VPC_ID PUBLIC_SUBNET_IDS_JSON; do
            eval "val=\${$name:-}"
            if [ -z "${val}" ]; then
              echo "Missing required environment secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Create temporary backend block for CI
        run: |
          cat > infra/terraform/backend.ci.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Terraform init
        run: |
          set -euo pipefail
          terraform -chdir=infra/terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=fleet-health-copilot/${TF_ENV}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate -no-color

      - name: Terraform apply (bootstrap latest tags)
        env:
          TF_VAR_vpc_id: ${{ secrets.VPC_ID }}
          TF_VAR_public_subnet_ids: ${{ secrets.PUBLIC_SUBNET_IDS_JSON }}
          TF_VAR_web_next_public_orchestrator_api_base_url: ${{ secrets.WEB_NEXT_PUBLIC_ORCHESTRATOR_API_BASE_URL }}
        run: |
          set -euo pipefail
          terraform -chdir=infra/terraform apply -auto-approve -input=false \
            -var-file="env/${TF_ENV}.tfvars" \
            -var="github_repository=${{ github.repository }}" \
            -var="web_next_public_clerk_publishable_key=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
            -var='container_image_tags={web="latest",orchestrator="latest"}'

      - name: Ensure Clerk runtime secret value is set
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          set -euo pipefail
          secret_arn=$(terraform -chdir=infra/terraform output -json managed_secret_arns | jq -r '."CLERK_SECRET_KEY" // empty')
          if [ -z "${secret_arn}" ]; then
            echo "Unable to resolve managed secret ARN for CLERK_SECRET_KEY" >&2
            exit 1
          fi

          aws secretsmanager put-secret-value \
            --secret-id "${secret_arn}" \
            --secret-string "${CLERK_SECRET_KEY}" >/dev/null

      - name: Resolve ECR repository URLs
        id: ecr
        run: |
          set -euo pipefail
          json=$(terraform -chdir=infra/terraform output -json ecr_repository_urls)
          web=$(echo "${json}" | jq -r '."web" // empty')
          orchestrator=$(echo "${json}" | jq -r '."orchestrator" // empty')
          if [ -z "${web}" ] || [ -z "${orchestrator}" ]; then
            echo "Missing ECR repository outputs." >&2
            exit 1
          fi
          echo "web=${web}" >> "$GITHUB_OUTPUT"
          echo "orchestrator=${orchestrator}" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.web }}:${{ github.sha }}
            ${{ steps.ecr.outputs.web }}:latest
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Build and push orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/orchestrator/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.orchestrator }}:${{ github.sha }}
            ${{ steps.ecr.outputs.orchestrator }}:latest

      - name: Terraform apply (pin image tags to commit SHA)
        env:
          TF_VAR_vpc_id: ${{ secrets.VPC_ID }}
          TF_VAR_public_subnet_ids: ${{ secrets.PUBLIC_SUBNET_IDS_JSON }}
          TF_VAR_web_next_public_orchestrator_api_base_url: ${{ secrets.WEB_NEXT_PUBLIC_ORCHESTRATOR_API_BASE_URL }}
        run: |
          set -euo pipefail
          terraform -chdir=infra/terraform apply -auto-approve -input=false \
            -var-file="env/${TF_ENV}.tfvars" \
            -var="github_repository=${{ github.repository }}" \
            -var="web_next_public_clerk_publishable_key=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
            -var="container_image_tags={web=\"${{ github.sha }}\",orchestrator=\"${{ github.sha }}\"}"

      - name: Post-deploy ALB health check
        run: |
          set -euo pipefail
          alb=$(terraform -chdir=infra/terraform output -raw web_load_balancer_dns_name)
          if [ -z "${alb}" ] || [ "${alb}" = "null" ]; then
            echo "Missing ALB DNS output." >&2
            exit 1
          fi

          for i in $(seq 1 20); do
            code=$(curl -k -o /dev/null -s -w "%{http_code}" "http://${alb}/" || true)
            if [ "${code}" = "200" ] || [ "${code}" = "302" ] || [ "${code}" = "307" ]; then
              echo "ALB health check passed with HTTP ${code}"
              exit 0
            fi
            echo "Waiting for ALB (${i}/20), got HTTP ${code}"
            sleep 15
          done

          echo "ALB health check failed" >&2
          exit 1
