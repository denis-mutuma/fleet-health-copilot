name: deploy-dev

# Manual entry point for Terraform checks. After you configure an AWS remote backend
# (see docs/terraform-bootstrap.md) and repository OIDC or access keys, extend this
# workflow with plan/apply steps that use your state bucket and var-file.

on:
  workflow_dispatch:

jobs:
  terraform-format-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt (root module)
        run: terraform fmt -check
        working-directory: infra/terraform

      - name: Terraform init (no remote backend)
        run: terraform init -backend=false -input=false
        working-directory: infra/terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: infra/terraform

      - name: Terraform fmt (state bootstrap)
        run: terraform fmt -check
        working-directory: infra/terraform/bootstrap-state

      - name: Terraform init bootstrap module
        run: terraform init -backend=false -input=false
        working-directory: infra/terraform/bootstrap-state

      - name: Terraform validate bootstrap module
        run: terraform validate
        working-directory: infra/terraform/bootstrap-state

  # Requires GitHub Actions OIDC: repository secret AWS_ROLE_ARN (IAM role ARN).
  # Uses local backend in CI (-backend=false); add backend.tf in the runner or a
  # follow-up init step when you want remote state in automation.
  terraform-plan-dev-aws:
    if: ${{ github.event_name == 'workflow_dispatch' && secrets.AWS_ROLE_ARN != '' }}
    needs: terraform-format-validate
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform init (no remote backend)
        run: terraform init -backend=false -input=false
        working-directory: infra/terraform

      - name: Terraform plan (dev)
        run: terraform plan -input=false -var-file=env/dev.tfvars
        working-directory: infra/terraform
