# Web production build runs Clerk during SSG; set repository secret NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
# (same Clerk test publishable key as in .env.local / GitHub Environment deploy secret).

name: dev

on:
  push:
    branches: ["develop", "feat/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install web dependencies
        run: npm ci --workspace apps/web
      - name: Lint web
        run: npm run web:lint
      - name: Ensure Clerk publishable key for Next.js build
        run: |
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]; then
            echo "::error::Missing secret NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY. Add it under Settings → Secrets and variables → Actions (repository secret). Use your Clerk test publishable key (pk_test_...)."
            exit 1
          fi
      - name: Build web
        run: npm run web:build
      - name: Install orchestrator dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e "services/orchestrator[dev]"
      - name: Run orchestrator tests
        run: PYTHONPATH=services/orchestrator/src .venv/bin/pytest -q services/orchestrator/tests
      - name: Run MCP tests
        run: |
          PYTHONPATH=services/mcp-telemetry/src .venv/bin/pytest -q services/mcp-telemetry/tests
          PYTHONPATH=services/mcp-retrieval/src .venv/bin/pytest -q services/mcp-retrieval/tests
          PYTHONPATH=services/mcp-incidents/src .venv/bin/pytest -q services/mcp-incidents/tests
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: Terraform fmt and validate (no remote backend)
        run: bash scripts/validate_terraform.sh
