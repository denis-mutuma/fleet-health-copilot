name: prod

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform format check
        run: terraform -chdir=infra/terraform fmt -check
      - name: Terraform init
        run: terraform -chdir=infra/terraform init -backend=false
      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate
      - name: Production deploy gate
        run: echo "Add environment-specific apply/deploy steps after AWS credentials and backend are configured."
