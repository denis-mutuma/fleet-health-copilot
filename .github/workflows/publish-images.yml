name: publish-images

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for ECR.
        required: true
        default: us-east-1
      role_to_assume:
        description: IAM role ARN allowed to push images to ECR.
        required: true
      web_repository_url:
        description: ECR repository URL for the web image.
        required: true
      orchestrator_repository_url:
        description: ECR repository URL for the orchestrator image.
        required: true
      image_tag:
        description: Image tag to publish.
        required: true
        default: latest
      next_public_clerk_publishable_key:
        description: Clerk publishable key used at web image build time.
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ inputs.web_repository_url }}:${{ inputs.image_tag }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ inputs.next_public_clerk_publishable_key }}

      - name: Build and push orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/orchestrator/Dockerfile
          push: true
          tags: ${{ inputs.orchestrator_repository_url }}:${{ inputs.image_tag }}
