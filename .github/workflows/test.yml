name: Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  web-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install web dependencies
        run: npm install --workspace apps/web

      - name: Lint web app
        run: npm run web:lint

      - name: Build web app
        run: npm run web:build

  orchestrator-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "services/orchestrator[dev]"

      - name: Run orchestrator tests
        run: PYTHONPATH=services/orchestrator/src pytest -q services/orchestrator/tests

  orchestrator-latency-guard:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "services/orchestrator[dev]"

      - name: Run non-blocking latency budget guard
        env:
          ORCHESTRATOR_LATENCY_BUDGET_MS: "40"
        run: PYTHONPATH=services/orchestrator/src python scripts/check_orchestrator_latency_budget.py

  mcp-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "services/orchestrator[dev]"
          pip install -e "services/mcp-telemetry"
          pip install -e "services/mcp-retrieval"
          pip install -e "services/mcp-incidents"

      - name: Run MCP tests
        run: |
          PYTHONPATH=services/mcp-telemetry/src pytest -q services/mcp-telemetry/tests
          PYTHONPATH=services/mcp-retrieval/src pytest -q services/mcp-retrieval/tests
          PYTHONPATH=services/mcp-incidents/src pytest -q services/mcp-incidents/tests

  docs-link-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        run: python3 scripts/check_markdown_links.py
