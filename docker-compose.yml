services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      - ORCHESTRATOR_API_BASE_URL=http://orchestrator:8000
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "8000:8000"
